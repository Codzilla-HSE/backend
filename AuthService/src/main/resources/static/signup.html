<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; margin-top: 50px; background-color: #f4f4f9; }
        .reg-card { border: 1px solid #ccc; padding: 25px; border-radius: 12px; width: 320px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { text-align: center; color: #333; }
        input { width: 100%; margin-bottom: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #0056b3; }
        #status { margin-top: 15px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

<div class="reg-card">
    <h3>Создать аккаунт</h3>
    <input type="text" id="username" placeholder="Придумайте логин">
    <input type="password" id="password" placeholder="Пароль">
    <input type="password" id="confirmPassword" placeholder="Повторите пароль">
    <button onclick="doSignup()">Зарегистрироваться</button>
    <p id="status"></p>
    <p style="text-align: center; font-size: 12px;">Уже есть аккаунт? <a href="/login.html">Войти</a></p>
</div>

<script>
    async function doSignup() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const statusEl = document.getElementById('status');

        // Простая проверка перед отправкой
        if (password !== confirmPassword) {
            statusEl.innerText = "Пароли не совпадают!";
            statusEl.style.color = "red";
            return;
        }

        try {
            const response = await fetch('/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                statusEl.innerText = "Регистрация успешна! Сейчас вы будете перенаправлены на вход...";
                statusEl.style.color = "green";
                // Перенаправляем на страницу логина через 2 секунды
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 2000);
            } else {
                const errorData = await response.text();
                statusEl.innerText = "Ошибка: " + (errorData || "не удалось зарегистрироваться");
                statusEl.style.color = "red";
            }
        } catch (error) {
            statusEl.innerText = "Ошибка сети. Проверьте соединение.";
            statusEl.style.color = "red";
        }
    }
</script>

</body>
</html>
