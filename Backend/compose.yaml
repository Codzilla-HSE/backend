services:
  postgres:
    container_name: codzilla_postgres
    image: postgres:15
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: testingdb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d testingdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: