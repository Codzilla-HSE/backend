spring.application.name=Backend
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

app.security.jwt.access-token-ttl=10m
app.security.jwt.refresh-token-ttl=7d

app.s3.endpoint=http://localhost:9000
app.s3.access-key=${S3_ACCESS_KEY}
app.s3.secret-key=${S3_PASSWORD}
app.s3.region=${S3_REGION}
app.s3.bucket-name=${S3_BUCKET_NAME}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}


spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=redis-password

logging.level.org.springframework.security=DEBUG


polygon.api.key=${POLYGON_KEY}
polygon.api.secret=${POLYGON_SECRET}
polygon.api.url=${POLYGON_API_URL:https://polygon.codeforces.com/api/}
judge0.base-url=${JUDGE0_BASE_URL}

