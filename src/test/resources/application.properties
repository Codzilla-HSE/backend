
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

app.submission.s3.endpoint=http://localhost:9000
app.submission.s3.access-key=minio-user
app.submission.s3.secret-key=minio-password
app.submission.s3.region=us-east-1
app.submission.s3.bucket-name=codzilla

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

app.security.jwt.access-token-ttl=10m
app.security.jwt.refresh-token-ttl=7d

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
